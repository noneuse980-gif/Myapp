<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KIITEE CMD">
<meta name="theme-color" content="#0a0c0f">
<meta name="description" content="KIITEE Command Center - Study Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>KIITEE Command Center</title>
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1318;
    --bg3: #151b22;
    --border: #1e2832;
    --border2: #243040;
    --green: #00ff88;
    --cyan: #00d4ff;
    --yellow: #ffd700;
    --red: #ff4466;
    --orange: #ff8800;
    --text: #c8d8e8;
    --text2: #6a8099;
    --text3: #3a5068;
    --phy: #00d4ff;
    --chem: #ff8800;
    --math: #00ff88;
    --font: 'Courier New', 'Lucida Console', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  #header {
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header .logo { color: var(--green); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; }
  #header .logo span { color: var(--cyan); }
  #clock-display { text-align: right; font-size: 0.75rem; }
  #time-big { color: var(--green); font-size: 1.1rem; font-weight: bold; letter-spacing: 2px; }
  #date-small { color: var(--text2); font-size: 0.65rem; letter-spacing: 1px; }

  /* ── NAV ── */
  #nav { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  #nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1; min-width: 70px; padding: 10px 6px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text2); font-family: var(--font); font-size: 0.65rem;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-btn:hover { color: var(--text); }

  /* ── PANELS ── */
  .panel { display: none; padding: 12px; animation: fadein 0.2s ease; }
  .panel.active { display: block; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── CARDS ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 12px; }
  .card-title {
    font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text2);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content: '▸'; color: var(--cyan); }

  /* ── COUNTDOWN ── */
  #countdown-wrap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .cd-block { background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 8px 10px; text-align: center; min-width: 52px; }
  .cd-num { font-size: 1.4rem; color: var(--yellow); font-weight: bold; line-height: 1; }
  .cd-label { font-size: 0.55rem; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  #exam-date-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 0.75rem; padding: 6px 8px; border-radius: 3px; margin-left: auto; }

  /* ── STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 8px; text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: bold; color: var(--green); }
  .stat-label { font-size: 0.55rem; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

  /* ── PROGRESS ── */
  .progress-wrap { margin: 6px 0; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.65rem; margin-bottom: 4px; color: var(--text2); }
  .progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  /* ── SYLLABUS ── */
  .subject-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 3px; cursor: pointer; margin-bottom: 2px; user-select: none;
  }
  .subject-header:hover { border-color: var(--border2); }
  .subject-name { font-size: 0.75rem; font-weight: bold; letter-spacing: 2px; }
  .subject-prog { font-size: 0.65rem; color: var(--text2); }
  .subject-arrow { font-size: 0.65rem; color: var(--text3); transition: transform 0.2s; }
  .subject-arrow.open { transform: rotate(90deg); }
  .unit-block { display: none; padding: 4px 0 4px 10px; border-left: 2px solid var(--border); margin-left: 8px; margin-bottom: 8px; }
  .unit-block.open { display: block; }
  .unit-title { font-size: 0.6rem; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; padding: 6px 0 4px; }
  .chapter-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 3px; cursor: pointer; transition: background 0.15s; }
  .chapter-item:hover { background: var(--bg3); }
  .chapter-cb { width: 14px; height: 14px; border: 1px solid var(--border2); border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.6rem; transition: all 0.15s; }
  .chapter-cb.done { background: var(--green); border-color: var(--green); color: #000; }
  .chapter-cb.prog { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .chapter-name { font-size: 0.72rem; flex: 1; }
  .chapter-name.done { text-decoration: line-through; color: var(--text3); }
  .chapter-status-btn { font-size: 0.55rem; padding: 2px 5px; border-radius: 2px; border: 1px solid var(--border2); background: none; color: var(--text2); font-family: var(--font); cursor: pointer; }
  .chapter-status-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ── TIMETABLE ── */
  .tt-controls { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 0.65rem; padding: 6px 10px; border-radius: 3px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; }
  .btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn.primary { border-color: var(--green); color: var(--green); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .day-tabs { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { padding: 5px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; font-size: 0.65rem; cursor: pointer; font-family: var(--font); color: var(--text2); white-space: nowrap; transition: all 0.15s; }
  .day-tab.active { border-color: var(--cyan); color: var(--cyan); }
  .day-tab.today { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.05); }
  .tt-slot { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; }
  .tt-time { font-size: 0.65rem; color: var(--text2); min-width: 90px; }
  .tt-subject-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tt-content { flex: 1; font-size: 0.72rem; }
  .tt-topic { font-size: 0.6rem; color: var(--text2); }
  .tt-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.8rem; padding: 2px 6px; }
  .tt-del:hover { color: var(--red); }
  .tt-empty { color: var(--text3); font-size: 0.7rem; text-align: center; padding: 20px; border: 1px dashed var(--border); border-radius: 4px; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; padding: 16px; width: 100%; max-width: 360px; }
  .modal-title { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--cyan); margin-bottom: 14px; }
  .form-group { margin-bottom: 10px; }
  .form-label { font-size: 0.6rem; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; display: block; }
  .form-input, .form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 0.75rem; padding: 8px 10px; border-radius: 3px; outline: none; }
  .form-input:focus, .form-select:focus { border-color: var(--cyan); }
  .form-select option { background: var(--bg3); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }

  /* ── TASKS ── */
  .task-input-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .task-input-row input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 0.75rem; padding: 8px 10px; border-radius: 3px; outline: none; }
  .task-input-row input:focus { border-color: var(--green); }
  .task-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; margin-bottom: 4px; transition: opacity 0.2s; }
  .task-item.done-task { opacity: 0.45; }
  .task-check { width: 16px; height: 16px; border: 1px solid var(--border2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 0.6rem; transition: all 0.15s; }
  .task-check.checked { background: var(--green); border-color: var(--green); color: #000; }
  .task-text { flex: 1; font-size: 0.72rem; cursor: pointer; }
  .task-text.done-text { text-decoration: line-through; color: var(--text3); }
  .task-priority { font-size: 0.55rem; padding: 2px 5px; border-radius: 2px; font-weight: bold; letter-spacing: 1px; }
  .prio-high { background: rgba(255,68,102,0.15); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
  .prio-med { background: rgba(255,215,0,0.1); color: var(--yellow); border: 1px solid rgba(255,215,0,0.2); }
  .prio-low { background: rgba(0,255,136,0.08); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .task-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.8rem; }
  .task-del:hover { color: var(--red); }
  .task-edit-input { flex: 1; background: var(--bg); border: 1px solid var(--cyan); color: var(--text); font-family: var(--font); font-size: 0.72rem; padding: 2px 6px; border-radius: 2px; outline: none; }
  .filter-btn.active-filter { border-color: var(--green); color: var(--green); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 360px) { html { font-size: 13px; } .cd-num { font-size: 1.1rem; } }
</style>
</head>
<body>

<div id="header">
  <div class="logo">KIITEE <span>CMD</span></div>
  <div id="clock-display">
    <div id="time-big">00:00:00</div>
    <div id="date-small">--</div>
  </div>
</div>

<div id="nav">
  <button class="tab-btn active" onclick="switchTab('dashboard')">⬡ Home</button>
  <button class="tab-btn" onclick="switchTab('syllabus')">▤ Syllabus</button>
  <button class="tab-btn" onclick="switchTab('timetable')">⊞ Timetable</button>
  <button class="tab-btn" onclick="switchTab('tasks')">◈ Tasks</button>
</div>

<!-- DASHBOARD -->
<div id="panel-dashboard" class="panel active">
  <div class="card">
    <div class="card-title">Exam Countdown
      <input type="date" id="exam-date-input" onchange="saveExamDate()" title="Set exam date" style="margin-left:auto">
    </div>
    <div id="countdown-wrap">
      <div class="cd-block"><div class="cd-num" id="cd-days">--</div><div class="cd-label">Days</div></div>
      <div class="cd-block"><div class="cd-num" id="cd-hours">--</div><div class="cd-label">Hrs</div></div>
      <div class="cd-block"><div class="cd-num" id="cd-mins">--</div><div class="cd-label">Min</div></div>
      <div class="cd-block"><div class="cd-num" id="cd-secs">--</div><div class="cd-label">Sec</div></div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="stat-overall">0%</div><div class="stat-label">Overall</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-tasks">0/0</div><div class="stat-label">Tasks Done</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-streak">🔥0</div><div class="stat-label">Streak</div></div>
  </div>
  <div class="card">
    <div class="card-title">Subject Progress</div>
    <div class="progress-wrap">
      <div class="progress-label"><span style="color:var(--phy)">▸ PHYSICS</span><span id="prog-phy-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-phy" style="background:var(--phy);width:0%"></div></div>
    </div>
    <div class="progress-wrap" style="margin-top:8px">
      <div class="progress-label"><span style="color:var(--chem)">▸ CHEMISTRY</span><span id="prog-chem-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-chem" style="background:var(--chem);width:0%"></div></div>
    </div>
    <div class="progress-wrap" style="margin-top:8px">
      <div class="progress-label"><span style="color:var(--math)">▸ MATHEMATICS</span><span id="prog-math-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-math" style="background:var(--math);width:0%"></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Today's Tasks</div>
    <div id="dash-tasks-preview"></div>
  </div>
</div>

<!-- SYLLABUS -->
<div id="panel-syllabus" class="panel">
  <div id="syllabus-container"></div>
</div>

<!-- TIMETABLE -->
<div id="panel-timetable" class="panel">
  <div class="tt-controls">
    <button class="btn primary" onclick="openAddSlot()">+ Add Slot</button>
    <button class="btn danger" onclick="clearDay()">Clear Day</button>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
  <div id="tt-slots"></div>
</div>

<!-- TASKS -->
<div id="panel-tasks" class="panel">
  <div class="task-input-row">
    <input type="text" id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
    <select id="task-prio" class="form-select" style="width:auto;padding:8px;">
      <option value="high">H</option>
      <option value="med" selected>M</option>
      <option value="low">L</option>
    </select>
    <button class="btn primary" onclick="addTask()">+</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
    <button class="btn filter-btn active-filter" id="filter-all" onclick="setFilter('all')">All</button>
    <button class="btn filter-btn" id="filter-active" onclick="setFilter('active')">Active</button>
    <button class="btn filter-btn" id="filter-done" onclick="setFilter('done')">Done</button>
    <button class="btn danger" onclick="clearDoneTasks()" style="margin-left:auto">Clear Done</button>
  </div>
  <div id="tasks-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="tt-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Add Study Slot</div>
    <div class="form-group">
      <label class="form-label">Subject</label>
      <select class="form-select" id="tt-subject">
        <option value="PHY">Physics</option>
        <option value="CHEM">Chemistry</option>
        <option value="MATH">Mathematics</option>
        <option value="REV">Revision</option>
        <option value="TEST">Mock Test</option>
        <option value="BREAK">Break</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Topic / Note</label>
      <input class="form-input" type="text" id="tt-topic" placeholder="e.g. Kinematics, Integration...">
    </div>
    <div class="form-group" style="display:flex;gap:8px;">
      <div style="flex:1">
        <label class="form-label">Start Time</label>
        <input class="form-input" type="time" id="tt-start">
      </div>
      <div style="flex:1">
        <label class="form-label">End Time</label>
        <input class="form-input" type="time" id="tt-end">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn primary" onclick="saveSlot()" style="flex:1">Save</button>
      <button class="btn" onclick="closeModal()" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══ SYLLABUS DATA ═══
const SYLLABUS = {
  PHY: {
    name: 'Physics', color: 'var(--phy)',
    units: [
      { name: 'Mechanics', chapters: ['Physical World & Measurement','Kinematics','Laws of Motion','Work, Energy & Power','Rotational Motion','Gravitation'] },
      { name: 'Properties of Matter', chapters: ['Properties of Solids & Liquids','Thermodynamics','Kinetic Theory of Gases'] },
      { name: 'Electromagnetism', chapters: ['Electrostatics','Current Electricity','Magnetic Effects of Current','Magnetism','EMI & Alternating Currents','Electromagnetic Waves'] },
      { name: 'Optics & Modern Physics', chapters: ['Optics','Dual Nature of Matter & Radiation','Atoms & Nuclei','Electronic Devices','Communication Systems'] }
    ]
  },
  CHEM: {
    name: 'Chemistry', color: 'var(--chem)',
    units: [
      { name: 'Physical Chemistry', chapters: ['Some Basic Concepts','States of Matter','Atomic Structure','Chemical Bonding','Chemical Thermodynamics','Solutions','Equilibrium','Redox Reactions','Electrochemistry','Chemical Kinetics','Surface Chemistry'] },
      { name: 'Inorganic Chemistry', chapters: ['Periodic Table','Hydrogen','s-Block Elements','p-Block Elements','d & f Block Elements','Coordination Compounds','Environmental Chemistry'] },
      { name: 'Organic Chemistry', chapters: ['Basic Organic Chemistry','Hydrocarbons','Haloalkanes & Haloarenes','Alcohols, Phenols & Ethers','Aldehydes, Ketones & Carboxylic Acids','Amines','Biomolecules','Polymers','Chemistry in Everyday Life'] }
    ]
  },
  MATH: {
    name: 'Mathematics', color: 'var(--math)',
    units: [
      { name: 'Algebra', chapters: ['Sets, Relations & Functions','Complex Numbers','Quadratic Equations','Permutations & Combinations','Binomial Theorem','Sequences & Series','Matrices & Determinants','Mathematical Reasoning'] },
      { name: 'Coordinate Geometry', chapters: ['Straight Lines','Conic Sections','3D Geometry'] },
      { name: 'Calculus', chapters: ['Limits & Continuity','Differentiability','Differentiation','Applications of Derivatives','Integration','Definite Integrals','Differential Equations'] },
      { name: 'Statistics & Misc', chapters: ['Trigonometry','Inverse Trigonometry','Vectors','Statistics','Probability'] }
    ]
  }
};

const SUBJECT_COLORS = { PHY:'#00d4ff', CHEM:'#ff8800', MATH:'#00ff88', REV:'#9966ff', TEST:'#ff4466', BREAK:'#3a5068' };
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ═══ STATE ═══
let chapterStatus = JSON.parse(localStorage.getItem('chapterStatus') || '{}');
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let timetable = JSON.parse(localStorage.getItem('timetable') || '{}');
let examDate = localStorage.getItem('examDate') || '';
let streak = parseInt(localStorage.getItem('streak') || '0');
let lastStudyDate = localStorage.getItem('lastStudyDate') || '';
let taskFilter = 'all';
let activeDayIndex = new Date().getDay();
let openSubjects = JSON.parse(localStorage.getItem('openSubjects') || '{}');
let openUnits = JSON.parse(localStorage.getItem('openUnits') || '{}');

function save() {
  localStorage.setItem('chapterStatus', JSON.stringify(chapterStatus));
  localStorage.setItem('tasks', JSON.stringify(tasks));
  localStorage.setItem('timetable', JSON.stringify(timetable));
}

// ═══ CLOCK ═══
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('time-big').textContent = `${hh}:${mm}:${ss}`;
  const opts = { weekday:'short', year:'numeric', month:'short', day:'numeric' };
  document.getElementById('date-small').textContent = now.toLocaleDateString('en-IN', opts).toUpperCase();
  updateCountdown(now);
  updateStreak(now);
}

function updateCountdown(now) {
  if (!examDate) return;
  const target = new Date(examDate + 'T00:00:00');
  const diff = target - now;
  if (diff < 0) {
    ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00');
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent = String(s).padStart(2,'0');
}

function updateStreak(now) {
  const today = now.toISOString().slice(0,10);
  if (lastStudyDate !== today) {
    const yesterday = new Date(now - 86400000).toISOString().slice(0,10);
    if (lastStudyDate === yesterday) {
      streak++;
    } else if (lastStudyDate && lastStudyDate !== today) {
      streak = 1;
    } else if (!lastStudyDate) {
      streak = 1;
    }
    lastStudyDate = today;
    localStorage.setItem('streak', streak);
    localStorage.setItem('lastStudyDate', lastStudyDate);
  }
}

function saveExamDate() {
  examDate = document.getElementById('exam-date-input').value;
  localStorage.setItem('examDate', examDate);
}

// ═══ TABS ═══
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'syllabus') renderSyllabus();
  if (name === 'timetable') renderTimetable();
  if (name === 'tasks') renderTasks();
}

// ═══ STATS ═══
function getProgress() {
  const result = {};
  let totalAll = 0, doneAll = 0;
  for (const sub of Object.keys(SYLLABUS)) {
    let total = 0, done = 0;
    for (const unit of SYLLABUS[sub].units) {
      for (const ch of unit.chapters) {
        const key = sub + '::' + ch;
        total++;
        if (chapterStatus[key] === 'done') done++;
      }
    }
    result[sub] = { total, done, pct: total ? Math.round(done/total*100) : 0 };
    totalAll += total; doneAll += done;
  }
  result.overall = { total: totalAll, done: doneAll, pct: totalAll ? Math.round(doneAll/totalAll*100) : 0 };
  return result;
}

// ═══ DASHBOARD ═══
function renderDashboard() {
  const prog = getProgress();
  document.getElementById('stat-overall').textContent = prog.overall.pct + '%';
  const done = tasks.filter(t => t.done).length;
  document.getElementById('stat-tasks').textContent = done + '/' + tasks.length;
  document.getElementById('stat-streak').textContent = '🔥' + streak;
  ['PHY','CHEM','MATH'].forEach(sub => {
    const p = prog[sub];
    const lower = sub.toLowerCase().replace('phy','phy').replace('chem','chem').replace('math','math');
    document.getElementById('prog-' + lower).style.width = p.pct + '%';
    document.getElementById('prog-' + lower + '-pct').textContent = p.pct + '%';
  });
  const preview = document.getElementById('dash-tasks-preview');
  const today = tasks.filter(t => !t.done).slice(0, 5);
  if (today.length === 0) {
    preview.innerHTML = '<div style="color:var(--text3);font-size:0.7rem;text-align:center;padding:10px;">No pending tasks</div>';
  } else {
    preview.innerHTML = today.map(t => `
      <div class="task-item" style="margin-bottom:4px;">
        <div class="task-check ${t.done?'checked':''}" onclick="toggleTask('${t.id}');renderDashboard()">✓</div>
        <span class="task-text">${escHtml(t.text)}</span>
        <span class="task-priority prio-${t.priority}">${t.priority.toUpperCase()}</span>
      </div>`).join('');
  }
  if (examDate) document.getElementById('exam-date-input').value = examDate;
}

// ═══ SYLLABUS ═══
function renderSyllabus() {
  const prog = getProgress();
  const container = document.getElementById('syllabus-container');
  container.innerHTML = '';
  for (const sub of Object.keys(SYLLABUS)) {
    const S = SYLLABUS[sub];
    const p = prog[sub];
    const isOpen = openSubjects[sub];
    const subDiv = document.createElement('div');
    subDiv.style.marginBottom = '8px';
    subDiv.innerHTML = `
      <div class="subject-header" onclick="toggleSubject('${sub}')">
        <span class="subject-name" style="color:${S.color}">${S.name.toUpperCase()}</span>
        <span class="subject-prog">${p.done}/${p.total} · ${p.pct}%</span>
        <span class="subject-arrow ${isOpen?'open':''}" id="sarrow-${sub}">▶</span>
      </div>
      <div class="unit-block ${isOpen?'open':''}" id="sblock-${sub}">
        ${S.units.map((unit, ui) => {
          const unitKey = sub + '::' + ui;
          const unitOpen = openUnits[unitKey];
          return `
          <div class="unit-title" onclick="toggleUnit('${unitKey}')" style="cursor:pointer;display:flex;justify-content:space-between;">
            <span>${unit.name.toUpperCase()}</span>
            <span style="color:var(--text3)">${unitOpen?'▲':'▼'}</span>
          </div>
          <div id="unit-${unitKey.replace(/:/g,'-')}" style="display:${unitOpen?'block':'none'}">
            ${unit.chapters.map(ch => {
              const key = sub + '::' + ch;
              const status = chapterStatus[key] || 'none';
              return `
              <div class="chapter-item" onclick="cycleChapter('${sub}','${escAttr(ch)}')">
                <div class="chapter-cb ${status==='done'?'done':status==='prog'?'prog':''}">${status==='done'?'✓':status==='prog'?'~':''}</div>
                <span class="chapter-name ${status==='done'?'done':''}">${escHtml(ch)}</span>
                <button class="chapter-status-btn" onclick="event.stopPropagation();cycleChapter('${sub}','${escAttr(ch)}')">${status==='none'?'TODO':status==='prog'?'IN PROG':'DONE'}</button>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(subDiv);
  }
}

function toggleSubject(sub) {
  openSubjects[sub] = !openSubjects[sub];
  localStorage.setItem('openSubjects', JSON.stringify(openSubjects));
  renderSyllabus();
}

function toggleUnit(key) {
  openUnits[key] = !openUnits[key];
  localStorage.setItem('openUnits', JSON.stringify(openUnits));
  renderSyllabus();
}

function cycleChapter(sub, ch) {
  const key = sub + '::' + ch;
  const cur = chapterStatus[key] || 'none';
  chapterStatus[key] = cur === 'none' ? 'prog' : cur === 'prog' ? 'done' : 'none';
  save();
  renderSyllabus();
}

// ═══ TIMETABLE ═══
function renderDayTabs() {
  const tabs = document.getElementById('day-tabs');
  const todayIdx = new Date().getDay();
  tabs.innerHTML = DAYS.map((d, i) => `
    <div class="day-tab ${i === activeDayIndex ? 'active' : ''} ${i === todayIdx ? 'today' : ''}" onclick="setDay(${i})">${d}</div>
  `).join('');
}

function setDay(i) {
  activeDayIndex = i;
  renderTimetable();
}

function renderTimetable() {
  renderDayTabs();
  const slots = (timetable[activeDayIndex] || []).slice().sort((a,b) => a.start.localeCompare(b.start));
  const container = document.getElementById('tt-slots');
  if (slots.length === 0) {
    container.innerHTML = '<div class="tt-empty">No slots for this day. Click "+ Add Slot" to begin.</div>';
    return;
  }
  container.innerHTML = slots.map((slot, i) => `
    <div class="tt-slot">
      <span class="tt-time">${fmt12(slot.start)} – ${fmt12(slot.end)}</span>
      <div class="tt-subject-dot" style="background:${SUBJECT_COLORS[slot.subject]||'#888'}"></div>
      <div class="tt-content">
        <div style="font-weight:bold;color:${SUBJECT_COLORS[slot.subject]||'#888'}">${slot.subject}</div>
        ${slot.topic ? `<div class="tt-topic">${escHtml(slot.topic)}</div>` : ''}
      </div>
      <button class="tt-del" onclick="deleteSlot(${i})">✕</button>
    </div>`).join('');
}

function fmt12(time) {
  if (!time) return '';
  const [h, m] = time.split(':');
  const hr = parseInt(h);
  return `${hr % 12 || 12}:${m} ${hr < 12 ? 'AM' : 'PM'}`;
}

function openAddSlot() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('tt-start').value = `${hh}:${mm}`;
  document.getElementById('tt-end').value = '';
  document.getElementById('tt-topic').value = '';
  document.getElementById('tt-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('tt-modal').classList.remove('open');
}

function saveSlot() {
  const subject = document.getElementById('tt-subject').value;
  const topic = document.getElementById('tt-topic').value.trim();
  const start = document.getElementById('tt-start').value;
  const end = document.getElementById('tt-end').value;
  if (!start) { alert('Please set a start time.'); return; }
  if (!timetable[activeDayIndex]) timetable[activeDayIndex] = [];
  timetable[activeDayIndex].push({ subject, topic, start, end });
  save();
  closeModal();
  renderTimetable();
}

function deleteSlot(i) {
  const sorted = (timetable[activeDayIndex] || []).slice().sort((a,b) => a.start.localeCompare(b.start));
  const slot = sorted[i];
  timetable[activeDayIndex] = (timetable[activeDayIndex] || []).filter(s => !(s.start === slot.start && s.subject === slot.subject && s.topic === slot.topic));
  save();
  renderTimetable();
}

function clearDay() {
  if (confirm(`Clear all slots for ${DAYS[activeDayIndex]}?`)) {
    timetable[activeDayIndex] = [];
    save();
    renderTimetable();
  }
}

// ═══ TASKS ═══
function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  const priority = document.getElementById('task-prio').value;
  tasks.unshift({ id: Date.now().toString(), text, priority, done: false, created: new Date().toISOString() });
  input.value = '';
  save();
  renderTasks();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  save();
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderTasks();
}

function clearDoneTasks() {
  tasks = tasks.filter(t => !t.done);
  save();
  renderTasks();
}

function setFilter(f) {
  taskFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
  document.getElementById('filter-' + f).classList.add('active-filter');
  renderTasks();
}

function renderTasks() {
  let filtered = tasks;
  if (taskFilter === 'active') filtered = tasks.filter(t => !t.done);
  if (taskFilter === 'done') filtered = tasks.filter(t => t.done);
  const list = document.getElementById('tasks-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:0.7rem;text-align:center;padding:20px;">No tasks here</div>';
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-item ${t.done?'done-task':''}">
      <div class="task-check ${t.done?'checked':''}" onclick="toggleTask('${t.id}')">✓</div>
      <span class="task-text ${t.done?'done-text':''}" ondblclick="editTask('${t.id}')">${escHtml(t.text)}</span>
      <span class="task-priority prio-${t.priority}">${t.priority.toUpperCase()}</span>
      <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>`).join('');
  const done = tasks.filter(t => t.done).length;
  document.getElementById('stat-tasks').textContent = done + '/' + tasks.length;
}

function editTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const list = document.getElementById('tasks-list');
  const items = list.querySelectorAll('.task-item');
  let filtered = tasks;
  if (taskFilter === 'active') filtered = tasks.filter(x => !x.done);
  if (taskFilter === 'done') filtered = tasks.filter(x => x.done);
  const idx = filtered.findIndex(x => x.id === id);
  if (idx < 0 || !items[idx]) return;
  const item = items[idx];
  const span = item.querySelector('.task-text');
  const input = document.createElement('input');
  input.className = 'task-edit-input';
  input.value = t.text;
  item.replaceChild(input, span);
  input.focus();
  input.onblur = () => { t.text = input.value.trim() || t.text; save(); renderTasks(); };
  input.onkeydown = e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') renderTasks(); };
}

// ═══ UTILS ═══
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'"); }

// ═══ SERVICE WORKER ═══
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
  });
}

// ═══ INIT ═══
function init() {
  if (examDate) document.getElementById('exam-date-input').value = examDate;
  renderDashboard();
  renderSyllabus();
  renderTimetable();
  renderTasks();
  updateClock();
  setInterval(updateClock, 1000);
}

init();
</script>
